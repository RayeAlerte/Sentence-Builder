name: Java CI with JUnit and SQLite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 24
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'oracle'

    - name: Download JavaFX SDK
      run: |
        wget https://download2.gluonhq.com/openjfx/24/openjfx-24_linux-x64_bin-sdk.zip
        unzip openjfx-24_linux-x64_bin-sdk.zip
        # The unzip usually creates javafx-sdk-24/lib
        echo "FX=$GITHUB_WORKSPACE/javafx-sdk-24/lib" >> $GITHUB_ENV
        echo "MYSQL=$GITHUB_WORKSPACE/mysql-connector-j-9.6.0/mysql-connector-j-9.6.0.jar" >> $GITHUB_ENV
        echo "MYSQLITE=$GITHUB_WORKSPACE/sqlite-jdbc-3.53.0.0.jar" >> $GITHUB_ENV

    - name: Setup Environment
      run: |
        # Create a dummy .env for test.sh to source if needed
        echo "FX=$FX" > .env
        echo "MYSQL=$MYSQL" >> .env
        echo "MYSQLITE=$MYSQLITE" >> .env

    - name: Make scripts executable
      run: chmod +x test.sh

    - name: Run Tests
      run: ./test.sh

    - name: Publish Test Summary
      if: always()
      run: |
        if [ -f test-results/report.md ]; then
          cat test-results/report.md >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: test-results/
