name: Java CI with JUnit and MySQL

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: BuilderWords
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 24
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'oracle'

    - name: Setup MySQL User
      run: |
        mysql -h 127.0.0.1 -u root -proot -e "CREATE USER 'sentencebuilder'@'%' IDENTIFIED BY 'Yo457S<DWL.D';"
        mysql -h 127.0.0.1 -u root -proot -e "GRANT ALL PRIVILEGES ON BuilderWords.* TO 'sentencebuilder'@'%';"
        mysql -h 127.0.0.1 -u root -proot -e "FLUSH PRIVILEGES;"

    - name: Initialize Database
      run: |
        mysql -h 127.0.0.1 -u sentencebuilder -p'Yo457S<DWL.D' BuilderWords < DDL.sql

    - name: Download JavaFX SDK
      run: |
        wget https://download2.gluonhq.com/openjfx/24/openjfx-24_linux-x64_bin-sdk.zip
        unzip openjfx-24_linux-x64_bin-sdk.zip
        # The unzip usually creates javafx-sdk-24/lib
        echo "FX=$GITHUB_WORKSPACE/javafx-sdk-24/lib" >> $GITHUB_ENV
        echo "MYSQL=mysql-connector-j-9.6.0.jar" >> $GITHUB_ENV

    - name: Setup Environment
      run: |
        # Create a dummy .env for test.sh to source if needed
        echo "FX=$FX" > .env
        echo "MYSQL=$MYSQL" >> .env

    - name: Make scripts executable
      run: chmod +x test.sh

    - name: Run Tests
      run: ./test.sh

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: test-results/
